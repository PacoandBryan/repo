<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diky Admin — Sign In</title>
  <style>
    :root {
      --bg: #0f172a; /* slate-900 */
      --card: #111827ee; /* gray-900 */
      --text: #e5e7eb; /* gray-200 */
      --muted: #9ca3af; /* gray-400 */
      --primary: #7c3aed; /* violet-600 */
      --primary-2: #22d3ee; /* cyan-400 */
      --danger: #ef4444; /* red-500 */
      --success: #22c55e; /* green-500 */
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: radial-gradient(1250px 650px at 10% -10%, rgba(124,58,237,.35), transparent 60%),
                  radial-gradient(1250px 650px at 110% 110%, rgba(34,211,238,.28), transparent 60%),
                  var(--bg);
      color: var(--text);
    }

    .container {
      display: grid;
      place-items: center;
      height: 100%;
      padding: 24px;
    }

    .card {
      position: relative;
      width: min(420px, 92vw);
      padding: 28px 28px 32px;
      border-radius: 16px;
      background: linear-gradient(180deg, #0b1221, #0b1221) padding-box,
                  linear-gradient(120deg, rgba(124,58,237,.8), rgba(34,211,238,.8)) border-box;
      border: 2px solid transparent;
      box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
      overflow: hidden;
      transform: translateZ(0);
      animation: cardIn .6s cubic-bezier(.2,.8,.2,1);
      margin: 20px; /* Added margin to the container */
    }

    .glow {
      position: absolute; inset: -2px;
      background: radial-gradient(150px 80px at var(--mx,50%) var(--my,50%), rgba(124,58,237,.18), transparent 60%),
                  radial-gradient(150px 80px at calc(100% - var(--mx,50%)) calc(100% - var(--my,50%)), rgba(34,211,238,.15), transparent 60%);
      filter: blur(20px);
      pointer-events: none;
    }

    .title {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; letter-spacing: .2px;
    }
    .title .badge { font-size: 12px; color: var(--muted); font-weight: 500; }

    .field {
      margin-top: 18px;
      display: grid; gap: 8px;
    }
    .field + .field { margin-top: 16px; }
    label { font-size: 13px; color: var(--muted); }
    input[type="text"], input[type="password"] {
      width: 80%; /* Lesser width for input fields */
      padding: 12px 14px;
      border-radius: 10px;
      outline: none;
      border: 1px solid #1f2937;
      background: #0b1221;
      color: var(--text);
      transition: border .2s, box-shadow .2s, transform .08s;
      text-align: center; /* center align text as requested */
      margin: 0 auto; /* ensure centered placement */
    }
    input:focus {
      border-color: rgba(124,58,237,.7);
      box-shadow: 0 0 0 4px rgba(124,58,237,.18);
    }

    .actions { margin-top: 22px; display: grid; gap: 10px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 16px;
      border-radius: 10px;
      border: none; cursor: pointer;
      color: white; font-weight: 700; letter-spacing: .2px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 10px 30px rgba(124,58,237,.35), 0 6px 14px rgba(34,211,238,.2);
      transition: transform .08s ease, box-shadow .2s ease, filter .2s;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px); }

    .error-panel {
      margin-top: 14px;
      display: grid; grid-template-columns: 24px 1fr; gap: 10px; align-items: start;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(239,68,68,.35);
      background: linear-gradient(180deg, rgba(239,68,68,.08), rgba(239,68,68,.06));
      color: #fecaca;
      animation: shake .6s cubic-bezier(.36,.07,.19,.97) both;
    }

    .error-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 30px rgba(239,68,68,.6);
      animation: pulse 1.8s infinite ease-in-out; }

    .subtle { color: var(--muted); font-size: 12px; }

    .footer { margin-top: 18px; display: flex; justify-content: space-between; align-items: center; }

    @keyframes cardIn { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes pulse { 0%,100%{ transform: scale(1); opacity: .85 } 50%{ transform: scale(1.25); opacity: 1 } }
    @keyframes shake {
      10%, 90% { transform: translateX(-1px); }
      20%, 80% { transform: translateX(2px); }
      30%, 50%, 70% { transform: translateX(-4px); }
      40%, 60% { transform: translateX(4px); }
    }
  </style>
</head>
<body>
  <div class="container" id="scene">
    <form class="card" method="POST" action="/admin/login" id="loginForm" data-error="{{ '1' if error else '0' }}">
      <div class="glow" id="glow"></div>
      <div class="title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 3l8 4v5c0 5-3.43 9.74-8 11-4.57-1.26-8-6-8-11V7l8-4z" stroke="url(#g1)" stroke-width="2"/>
          <defs>
            <linearGradient id="g1" x1="0" x2="24" y1="0" y2="24">
              <stop offset="0%" stop-color="var(--primary)"/>
              <stop offset="100%" stop-color="var(--primary-2)"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <div>Diky Admin</div>
          <div class="badge">Secure Sign In</div>
        </div>
      </div>

      {% if error %}
      <div class="error-panel" id="errorPanel">
        <div class="error-dot"></div>
        <div>
          <strong>Incorrect credentials</strong>
          <div class="subtle">Please double‑check your username and password.</div>
        </div>
      </div>
      {% endif %}

      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="admin" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <div class="actions">
        <button class="btn" type="submit" id="signInBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 5l7 7-7 7" stroke="white" stroke-width="2"/></svg>
          Sign In
        </button>
      </div>

      <div class="footer">
        <div class="subtle">© Diky.mx</div>
        <div class="subtle">Secure session</div>
      </div>
    </form>
  </div>

  <script>
    // Fancy pointer glow
    const card = document.querySelector('.card');
    const glow = document.getElementById('glow');
    document.addEventListener('pointermove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const y = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
      glow.style.setProperty('--mx', (x*100).toFixed(1)+'%');
      glow.style.setProperty('--my', (y*100).toFixed(1)+'%');
    });

    // Audio feedback using WebAudio API (no external assets)
    function playErrorSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(220, ctx.currentTime);
      g.gain.setValueAtTime(0.001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
      o.connect(g).connect(ctx.destination);
      o.start();
      setTimeout(() => { o.stop(); ctx.close(); }, 280);
    }

    function playSuccessSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(540, ctx.currentTime);
      g.gain.setValueAtTime(0.001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.24);
      o.connect(g).connect(ctx.destination);
      o.start();
      setTimeout(() => { o.stop(); ctx.close(); }, 260);
    }

    // If server flagged an error (data attribute), play sound
    (function(){
      var formEl = document.getElementById('loginForm');
      if (formEl && formEl.dataset && formEl.dataset.error === '1') {
        playErrorSound();
      }
    })();

    // Optional: intercept submit to give instant UI feedback
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('signInBtn');
    form.addEventListener('submit', () => {
      btn.disabled = true;
      btn.style.filter = 'brightness(0.9)';
      btn.textContent = 'Signing in…';
      // Don't prevent default; server will redirect on success
    });
  </script>
</body>
</html>
